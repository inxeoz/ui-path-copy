<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 14px; margin: 0; font-size: 13px; color: #1e293b; }
  h1 { font-size: 15px; color: #1E3A5F; margin: 0 0 14px; }
  label { display: block; font-size: 12px; margin: 6px 0 2px; color: #475569; }
  select, button { width: 100%; padding: 7px 8px; margin: 3px 0; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 13px; background: #fff; }
  select:focus { outline: none; border-color: #1E3A5F; }
  button.primary { background: #1E3A5F; color: #FFD700; border: none; font-weight: 600; cursor: pointer; }
  button.primary:hover { background: #2a5070; }
  button.primary:active { background: #16304a; }
  hr { border: none; border-top: 1px solid #e2e8f0; margin: 12px 0; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .row label { margin: 0; cursor: pointer; }
  .version { color: #94a3b8; font-size: 10px; text-align: center; margin-top: 10px; }
  .badge { display: inline-block; background: #e2e8f0; color: #475569; font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: 4px; }
</style>
</head>
<body>

<h1>UI Path Copy</h1>

<label for="format">Output format:</label>
<select id="format">
  <option value="playwright-path">Playwright path (tag[n] + testid)</option>
  <option value="css-selector">CSS selector (nth-of-type)</option>
  <option value="xpath">XPath</option>
  <option value="test-snippet">Playwright snippet</option>
</select>

<hr>

<div class="row">
  <label for="highlight">Highlight on copy</label>
  <input type="checkbox" id="highlight" checked>
</div>
<div class="row">
  <label for="shadowDom">Traverse shadow DOM</label>
  <input type="checkbox" id="shadowDom" checked>
</div>
<div class="row">
  <label for="skipTestignore">Skip <code>data-testignore</code></label>
  <input type="checkbox" id="skipTestignore" checked>
</div>

<hr>

<button class="primary" id="copyAll">Copy All testids on Page</button>
<button class="primary" id="toggleInspector">Toggle Inspector Mode</button>

<div class="version">v2.0.0</div>

<script src="popup.js"></script>
</body>
</html>
